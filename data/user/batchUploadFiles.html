<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>批量上传</title>
    <link rel="stylesheet" type="text/css" href="/user/batchUploadFiles.css">
    <link rel="stylesheet" type="text/css" href="/user/commonControlPanel.css">
    <link rel="stylesheet" type="text/css" href="/user/commonTransfer.css">
    <script type="text/javascript" src="/user/constants.js"></script>
    <script type="text/javascript" src="/user/commonUtils.js"></script>
    <script type="text/javascript" src="/user/commonFiles.js"></script>
    <script type="text/javascript" src="/user/commonTransfer.js"></script>
    <script type="text/javascript" src="/user/batchUploadFiles.js"></script>
    <link rel="icon" type="image/png" href="/user/img/logo.png">
    <script src="/user/live2d_3/js/jquery.min.js"></script>
    <script src="/user/live2d_3/js/bootstrap.min.js"></script>
    <!-- Live2DCubismCore -->
    <script src="/user/live2d_3/js/live2dcubismcore.min.js"></script>
    <!-- Include Pixi. -->
    <script src="/user/live2d_3/js/pixi.min.js"></script>
    <!-- Include Cubism Components. -->
    <script src="/user/live2d_3/js/live2dcubismframework.js"></script>
    <script src="/user/live2d_3/js/live2dcubismpixi.js"></script>
    <!-- User's Script -->
    <script src="/user/live2d_3/js/charData.js"></script>
    <script src="/user/live2d_3/js/l2d.js"></script>
    <script src="/user/live2d_3/js/main.js"></script>

    <script src="/user/sockjs.js"></script>
</head>

<body onload="initHandlers()">
    <div class="uploadStatus">
        <div id="stopButton" onclick="stopTransfer()">
            <img src="/user/img/ic_fluent_dismiss_48_regular.svg" alt="停止">
        </div>
        <span class="title">传输状态</span>
        <ul class="statusList">
            <li class="status" id="currentFile">当前文件：</li>
            <li class="status" id="fileSize">文件大小：</li>
            <li class="status" id="fileTotalNum">文件总数：（正在计算）</li>
            <li class="status" id="fileNum">已发送个数：</li>
<!--            <li class="status" id="receiveNum">已接收个数：</li>-->
            <li class="status" id="speed">速度：</li>
            <li class="status" id="percent">当前文件进度：</li>
        </ul>
    </div>
    <div class="controlPanelBackground" onclick="switchControlPanel()">
        <div class="controlPanel">
            <span class="title">控制面板</span>
            <ul>
                <li>
                    <label for="compressMethod">压缩方法</label>
                    <select id="compressMethod" onchange="setCompressMethod()">
                        <option value="zip">ZIP</option>
                        <option value="xz">XZ</option>
                        <option value="zstd">ZStandard</option>
                        <option value="tar">TAR</option>
                        <option value="gzip">GZIP</option>
                        <option value="bzip2">BZIP2</option>
                    </select>
                </li>
                <li>
                    <label for="compressLevel">压缩等级</label>
                    <select id="compressLevel" onchange="setCompressLevel()">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </li>
                <li>
                    <label for="useProxy">使用代理</label>
                    <input class="inputCheck" type="checkbox" id="useProxy" onchange="setUseProxy()">
                </li>
                <li>
                    <label for="proxyHostName">代理主机</label>
                    <input class="inputText" type="text" id="proxyHostName" onchange="setProxyHostName()">
                </li>
                <li>
                    <label for="proxyPort">代理端口</label>
                    <input class="inputText" type="text" id="proxyPort" onchange="setProxyPort()">
                </li>
            </ul>
        </div>
    </div>
    <div class="settings" onclick="switchControlPanel()">
        <img src="/user/img/settings.svg" alt="设置">
    </div>
    <div class="batchUploadFiles">
        <div class="batchUploadFiles-top">批量上传</div>
        <div class="batchUploadFiles-center clearfix">
            <div class="batchUploadFiles-center-img">
                <img src="/user/img/download_link.svg" alt="主机地址">
            </div>
            <div class="batchUploadFiles-center-input">
                <label for="uploadHost"></label><input id="uploadHost" type="text" name value placeholder="请输入主机地址"
                    onfocus="this.placeholder=''" onblur="this.placeholder='请输入主机地址'">
                <div class="batchUploadFiles-center-input-text">主机地址</div>
            </div>
        </div>
        <div class="batchUploadFiles-center clearfix">
            <div class="batchUploadFiles-center-img">
                <img src="/user/img/name.svg" alt="用户名">
            </div>
            <div class="batchUploadFiles-center-input">
                <label for="username"></label><input id="username" type="text" name value placeholder="请输入您的用户名"
                    onfocus="this.placeholder=''" onblur="this.placeholder='请输入您的用户名'">
                <div class="batchUploadFiles-center-input-text">用户名</div>
            </div>
        </div>
        <div class="batchUploadFiles-center clearfix">
            <div class="batchUploadFiles-center-img">
                <img src="/user/img/password.svg" alt="密码">
            </div>
            <div class="batchUploadFiles-center-input">
                <label for="password"></label><input id="password" type="password" name value placeholder="请输入您的密码"
                    onfocus="this.placeholder=''" onblur="this.placeholder='请输入您的密码'">
                <div class="batchUploadFiles-center-input-text">密码</div>
            </div>
        </div>
        <div class="batchUploadFiles-center clearfix">
            <div class="batchUploadFiles-center-img">
                <img src="/user/img/upload_location.svg" alt="上传路径">
            </div>
            <div class="batchUploadFiles-center-input">
                <label for="uploadPath"></label><input id="uploadPath" type="text" name value
                    placeholder="请输入上传路径，用;分割多个路径" onfocus="this.placeholder=''" onblur="this.placeholder='请输入上传路径'">
                <div class="batchUploadFiles-center-input-text">上传路径</div>
            </div>
        </div>
        <div class="batchUploadFiles-center clearfix">
            <div class="batchUploadFiles-center-img">
                <img src="/user/img/ic_fluent_save_24_regular.svg" alt="保存路径">
            </div>
            <div class="batchUploadFiles-center-input">
                <label for="savePath"></label><input id="savePath" type="text" name value placeholder="请输入保存路径"
                    onfocus="this.placeholder=''" onblur="this.placeholder='请输入保存路径'">
                <div class="batchUploadFiles-center-input-text">保存路径</div>
            </div>
        </div>
        <div class="batchUploadFiles-button" onclick="startTransfer()">开始上传</div>

    </div>
    <div class="Canvas left" style="position: absolute; margin-top: 75vh; margin-left: -3%; z-index: 2">
        <canvas width="400" height="300"
            style="touch-action: none; width: 20vw; height: 11.25vw; cursor: inherit;"></canvas>
    </div>
</body>

</html>
